name: Generate SBOM

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    # Liest die Core-Version aus CMakeLists.txt
    - name: Get software version
      run: |
        VER=`grep -E -o "version[[:blank:]]+=[[:blank:]]\"+[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+" pyproject.toml | sed "s/[^0-9.]*//g"`
        echo "Software version '$VER' detected"
        echo "SW_VERSION=$VER" >> $GITHUB_ENV

    - name: Create SBOM
      uses: sbomify/sbomify-action@master
      env:
        LOCK_FILE: requirements.txt
        OUTPUT_FILE: sbom_windows.cdx.json
        COMPONENT_NAME: CRI-Python-Lib
        COMPONENT_VERSION: ${{ env.SW_VERSION }}
        # Produkt- und Firmeninfo werden aus sbomify.json geladen
        AUGMENT: true
        # Metadaten aus Paket-Registry hinzufügen
        ENRICH: true
        UPLOAD: false

    - name: Export SBOM
      uses: actions/upload-artifact@v7
      with:
        path: sbom_windows.cdx.json
        archive: false

    - uses: actions/setup-go@v6

    - name: Install SBOM QA tool
      run: go install github.com/interlynk-io/sbomqs@latest

    - name: SBOM quality score
      run: sbomqs score sbom_windows.cdx.json

    # Checks compliance with the latest version of BSI TR-03183-2
    - name: Check CRA compliance
      run: sbomqs compliance --bsi --color sbom_windows.cdx.json

    - name: List component licenses
      run: sbomqs list --feature comp_with_declared_license --show sbom_windows.cdx.json

    # TODO: Nicht CRA-konforme Felder füllen

    # Security Audit
    - name: Scan for vulnerabilities
      uses: anchore/scan-action@v7
      with:
        sbom: sbom_windows.cdx.json
        cache-db: true
